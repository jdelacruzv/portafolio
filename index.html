        <!--===== CONTACT =====-->   
        <section id="contact" class="contact">
          <h2 class="subtitle">Contact</h2>
          <hr class="line-ver">
          <form name="contact" method="POST" class="contact-form" netlify-honeypot="bot-field" data-netlify="true">
            <div class="form-container">
              <!-- Campo honeypot (tarro de miel) para evitar los bots de spam -->
              <p class="hidden">
                <label>Don’t fill this out if you’re human: <input name="bot-field" /></label>
              </p>
              <div class="group">
                <input type="text" name="name" id="name" required><span class="bar"></span>
                <label for="">Nombre</label>
              </div>
              <div class="group">
                  <input type="email" name="email" id="email" required><span class="bar"></span>
                  <label for="">Correo</label>
              </div>
              <div class="group">
                  <textarea name="subject" id="subject" rows="3" required></textarea><span class="bar"></span>
                  <label for="">Asunto</label>
              </div>
              <p class="warnings"></p>
              <button type="submit">Enviar<i class="fas fa-envelope btn__icon"></i></button>
            </div>
          </form>
          <div class="redes">
            <a href="https://github.com/jdelacruzv" target="_blank" class="redes-link github"></a>
